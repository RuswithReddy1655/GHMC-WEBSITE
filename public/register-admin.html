<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <title>Admin Registration</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body { background:#eef2f5; }
        .card { border-radius:14px; }
        .msg { font-size:13px; }
    </style>
</head>

<body>

<div class="container d-flex justify-content-center align-items-center vh-100">

    <div class="card shadow p-4 w-75">

        <h3 class="text-center mb-4">Admin Registration</h3>

        <form id="adminForm">

            <input class="form-control mb-3" id="name" placeholder="Full Name" required>

            <input class="form-control mb-3" id="empId" placeholder="Employee ID" required>

            <!-- Mobile + OTP -->
            <div class="d-flex gap-2 mb-2">
                <input class="form-control" id="mobile" placeholder="Mobile Number" maxlength="10" required>
                <button type="button" class="btn btn-secondary" id="sendOtpBtn">Send OTP</button>
            </div>

            <div class="d-flex gap-2 mb-1">
                <input class="form-control" id="otp" placeholder="Enter OTP">
                <button type="button" class="btn btn-success" id="verifyOtpBtn">Verify</button>
            </div>

            <small id="otpMsg" class="msg"></small>

            <!-- Department -->
            <select class="form-control mt-3" id="department" required>
                <option value="">Select Department</option>
                <option>Sanitation</option>
                <option>Roads and Infrastructure</option>
                <option>Water Supply</option>
                <option>Health and Sanitation</option>
                <option>Parks and Recreation</option>
                <option>Street Lighting</option>
                <option>Building Permissions</option>
                <option>Waste Management</option>
            </select>

            <!-- Designation -->
            <input class="form-control mt-3" id="designation" placeholder="Designation" required>

            <!-- Zone -->
            <select class="form-control mt-3" id="zone" required>
                <option value="">Select Zone</option>
                <option>Malkajgiri</option>
                <option>Kanajiguda</option>
                <option>Uppal</option>
                <option>LB Nagar</option>
                <option>Shamshabad</option>
                <option>Rajendranagar</option>
                <option>Charminar</option>
                <option>Golconda</option>
                <option>Khairatabad</option>
                <option>Secunderabad</option>
                <option>Serilingampally</option>
                <option>Kukatpally</option>
                <option>Quthbullapur</option>
            </select>

            <!-- Password -->
            <div class="input-group mt-3">
                <input type="password" id="password" class="form-control" placeholder="Password">
                <button type="button" class="btn btn-outline-secondary" id="togglePass">Show</button>
            </div>
            <small id="passMsg" class="msg text-danger"></small>

            <!-- Confirm -->
            <div class="input-group mt-3">
                <input type="password" id="confirmPassword" class="form-control" placeholder="Confirm Password">
                <button type="button" class="btn btn-outline-secondary" id="toggleConfirm">Show</button>
            </div>

            <button type="submit" class="btn btn-success w-100 mt-4">
                Register Admin
            </button>

        </form>

    </div>

</div>

<!-- ✅ fixed path -->
<script src="js/registerAdmin.js"></script>

</body>
</html>
