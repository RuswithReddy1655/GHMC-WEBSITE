<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>

    <title>Citizen Panel - GHMC</title>

    <!-- Font Awesome -->
    <link rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

    <!-- Bootstrap (for table styling) -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family: Arial, Helvetica, sans-serif;
        }

        body{
            display:flex;
            height:100vh;
            background:#f4f6f9;
        }

        /* ===== SIDEBAR ===== */
        .sidebar{
            width:240px;
            background:#0f2d4d;
            color:white;
            padding-top:20px;
            display:flex;
            flex-direction:column;
        }

        .sidebar h2{
            text-align:center;
            margin-bottom:30px;
            font-size:20px;
        }

        .sidebar a{
            color:white;
            text-decoration:none;
            padding:14px 20px;
            display:flex;
            align-items:center;
            gap:12px;
        }

        .sidebar a:hover{
            background:#173f6b;
        }

        .sidebar a.active{
            background:#14532d;
        }

        .logout{
            margin-top:auto;
            margin-bottom:20px;
        }

        /* ===== CONTENT ===== */
        .content{
            flex:1;
            padding:40px;
            overflow:auto;
        }

        .header{
            font-size:22px;
            font-weight:bold;
            margin-bottom:20px;
            color:#0f2d4d;
        }

        .card{
            background:white;
            padding:25px;
            border-radius:10px;
            box-shadow:0 2px 8px rgba(0,0,0,0.1);
        }
    </style>
</head>

<body>

<!-- ================= SIDEBAR ================= -->
<div class="sidebar">

    <h2><i class="fa-solid fa-user"></i> Citizen Panel</h2>

    <a href="citizen-dashboard.html" class="active">
        <i class="fa-solid fa-list-check"></i> My Complaints
    </a>

    <a href="report-issue.html">
        <i class="fa-solid fa-triangle-exclamation"></i> Report Issue
    </a>

    <a href="track.html">
        <i class="fa-solid fa-magnifying-glass"></i> Track Complaint
    </a>

    <a href="login.html" class="logout">
        <i class="fa-solid fa-right-from-bracket"></i> Logout
    </a>
</div>


<!-- ================= CONTENT ================= -->
<div class="content">

    <div class="header">
        Welcome, Citizen 👋
    </div>

    <div class="card">

        <h4 class="mb-3">Ongoing Complaints</h4>

        <table class="table table-bordered" id="complaintTable">
            <thead class="table-dark">
                <tr>
                    <th>ID</th>
                    <th>Department</th>
                    <th>Zone</th>
                    <th>Circle</th>
                    <th>Ward</th>
                    <th>Address</th>
                    <th>Status</th>
                    <th>Date</th>
                </tr>
            </thead>
            <tbody></tbody>
        </table>

    </div>

</div>


<!-- ================= DASHBOARD SCRIPT ================= -->
<script>
document.addEventListener("DOMContentLoaded", () => {

    const tableBody = document.querySelector("#complaintTable tbody");

    const complaints = JSON.parse(localStorage.getItem("complaints")) || [];

    if (complaints.length === 0) {
        tableBody.innerHTML = `
            <tr>
                <td colspan="8" class="text-center">No complaints yet</td>
            </tr>
        `;
        return;
    }

    complaints.forEach(c => {

        tableBody.innerHTML += `
            <tr>
                <td>${c.id}</td>
                <td>${c.department}</td>
                <td>${c.zone}</td>
                <td>${c.circle}</td>
                <td>${c.ward}</td>
                <td>${c.address}</td>
                <td style="color:orange;font-weight:bold">${c.status}</td>
                <td>${c.date}</td>
            </tr>
        `;
    });

});
</script>

</body>
</html>
