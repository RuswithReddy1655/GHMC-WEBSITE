<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <title>GHMC Citizen Registration</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background:#eef2f5;
        }

        .card{
            border-radius:14px;
        }

        .msg{
            font-size:13px;
        }
    </style>
</head>

<body>

<div class="container d-flex justify-content-center align-items-center vh-100">

    <div class="card shadow p-4 w-75">

        <h3 class="text-center mb-4">Citizen Registration</h3>

        <form id="registerForm">

            <!-- Name -->
            <input class="form-control mb-3" id="name" placeholder="Full Name" required>

            <!-- Mobile + OTP -->
            <div class="d-flex gap-2 mb-2">
                <input class="form-control" id="mobile" placeholder="Mobile Number" maxlength="10" required>
                <button type="button" class="btn btn-secondary" id="sendOtpBtn">Send OTP</button>
            </div>

            <div class="d-flex gap-2 mb-1">
                <input class="form-control" id="otp" placeholder="Enter OTP">
                <button type="button" class="btn btn-success" id="verifyOtpBtn">Verify</button>
            </div>

            <small id="otpMsg" class="msg"></small>


            <!-- Address -->
            <textarea class="form-control mt-3" id="address" rows="3" placeholder="Address" required></textarea>


            <!-- Pincode -->
            <input class="form-control mt-3" id="pincode" placeholder="Pincode" maxlength="6" required>


            <!-- Password -->
            <div class="input-group mt-3">
                <input type="password" id="password" class="form-control" placeholder="Password">
                <button type="button" class="btn btn-outline-secondary" id="togglePass">Show</button>
            </div>
            <small id="passMsg" class="msg text-danger"></small>


            <!-- Confirm Password -->
            <div class="input-group mt-3">
                <input type="password" id="confirmPassword" class="form-control" placeholder="Confirm Password">
                <button type="button" class="btn btn-outline-secondary" id="toggleConfirm">Show</button>
            </div>


            <!-- Submit -->
            <button class="btn btn-success w-100 mt-4">Register</button>

        </form>

    </div>
</div>
<!-- IMPORTANT: load JS AFTER HTML -->
<script src="/js/registerCitizen.js"></script>
</body>
</html>
